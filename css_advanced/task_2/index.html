<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool</title>

    <!-- Police utilisée dans le design Holberton -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700,900" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="#">
            <img src="logo.png" alt="Logo">
        </a>
        <nav>
            <a href="#">COURSES</a>
            <a href="#">PRICING</a>
            <a href="#">LOGIN</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Get schooled</h1>

        <div class="keywords">
            <p>SMILES</p>
            <p>GRIN</p>
            <p>LAUGH</p>
        </div>

        <button>REGISTER FOR FREE</button>

        <div class="pros">
            <h2><span class="purple">Learn</span> from the pros</h2>

            <div class="people">
                <div>
                    <img src="avatar1.png" alt="Phillip Massey">
                    <h3>Phillip Massey</h3>
                    <p>« Smile of the year » 2018 - 2019</p>
                </div>

                <div>
                    <img src="avatar2.png" alt="Nannie Lawrence">
                    <h3>Nannie Lawrence</h3>
                    <p>Best « little smile » 2017</p>
                </div>

                <div>
                    <img src="avatar3.png" alt="Bruce Walters">
                    <h3>Bruce Walters</h3>
                    <p>Best « Friend Smile » live performance 2019</p>
                </div>

                <div>
                    <img src="avatar4.png" alt="Henry Hughes">
                    <h3>Henry Hughes</h3>
                    <p>« 24h smiles » winner 2016 - 2019</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
